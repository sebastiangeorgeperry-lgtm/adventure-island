// ---------- deterministic rng ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// ---------- map ----------
// tiles: 0 shallow water,1 sand,2 grass,3 tree,4 path,5 dock,6 rock,7 flowers,8 deep water,
// 9 snow,10 stone quay,11 maple tree,12 mushroom,13 bridge,14 dark rock,16 castle wall,
// 17 boat deck,18 stairs,19 dark grass
const map=new Array(MW*MH).fill(8);
const T=(x,y)=>map[y*MW+x];
const setT=(x,y,v)=>{if(x>=0&&x<MW&&y>=0&&y<MH)map[y*MW+x]=v};
const SOLID=t=>t===0||t===8||t===3||t===6||t===11||t===12||t===14||t===16||t===20;

(function genMap(){
  const rng=mulberry32(20260720);
  // island blob: grass core, sand ring, shallow water halo
  function blob(cx,cy,rx,ry,opt){
    opt=opt||{};
    const base=opt.base||2;
    for(let y=Math.max(0,cy-ry-6);y<=Math.min(MH-1,cy+ry+6);y++)
    for(let x=Math.max(0,cx-rx-6);x<=Math.min(MW-1,cx+rx+6);x++){
      const nx=(x-cx)/rx,ny=(y-cy)/ry;
      const ang=Math.atan2(ny,nx);
      const wob=1+0.07*Math.sin(ang*3+cx)+0.05*Math.sin(ang*7+cy);
      const d=Math.sqrt(nx*nx+ny*ny)/wob;
      if(d<0.8){
        let t=base;
        const r=rng();
        if(opt.tree&&r<opt.tree)t=opt.mapleTrees?11:3;
        else if(opt.rock&&r<(opt.tree||0)+opt.rock)t=opt.dark?14:6;
        else if(opt.flower&&r<(opt.tree||0)+(opt.rock||0)+opt.flower)t=7;
        else if(opt.mush&&r<(opt.tree||0)+(opt.rock||0)+(opt.flower||0)+opt.mush)t=12;
        setT(x,y,t);
      }
      else if(d<1){const c=T(x,y);if(c===8||c===0)setT(x,y,1)}
      else if(d<1.35){if(T(x,y)===8)setT(x,y,0)}
    }
  }
  // ---- islands ----
  blob(120,90,27,20,{tree:0.10,rock:0.015,flower:0.06});           // central hub
  blob(120,42,23,16,{tree:0.06,rock:0.05});                        // snow mountain (N)
  blob(62,46,22,13,{tree:0.08,rock:0.02});                         // harbor town (NW)
  blob(180,38,19,13,{tree:0.16,flower:0.04});                      // pagoda woods (NE)
  blob(213,55,7,5,{tree:0.12});                                    // islet
  blob(203,17,6,4,{tree:0.1});                                     // islet
  blob(52,90,16,11,{tree:0.14,mapleTrees:true,flower:0.05});       // maple isle (W)
  blob(56,138,18,12,{flower:0.12,rock:0.02});                      // castle isle (SW)
  blob(190,95,20,14,{base:19,rock:0.06,dark:true});                // beast isle (E)
  blob(168,140,20,12,{tree:0.06,mush:0.08,flower:0.03});           // mushroom beach (SE)
  // snow cap on mountain
  for(let y=26;y<=48;y++)for(let x=104;x<=136;x++){
    const dx=(x-120)/12,dy=(y-37)/9;
    if(dx*dx+dy*dy<1&&T(x,y)!==8&&T(x,y)!==0)setT(x,y,T(x,y)===6?6:9);
  }
  // maple pond
  for(let y=86;y<=94;y++)for(let x=46;x<=58;x++){
    const dx=(x-52)/5.5,dy=(y-90)/3.5;
    if(dx*dx+dy*dy<1&&T(x,y)!==8)setT(x,y,0);
  }
  // mushroom beach: south half is big sand beach
  for(let y=140;y<=152;y++)for(let x=148;x<=188;x++){
    const t=T(x,y);if(t===2||t===7||t===12||t===3)setT(x,y,1);
  }

  // ---- HARBOR TOWN stamp (modeled on the reference) ----
  const rect=(x1,y1,x2,y2,t)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)setT(x,y,t)};
  // stone quay platform (stepped like the reference)
  rect(55,33,73,48,10);
  rect(52,38,54,48,10);
  rect(50,42,51,48,10);
  // temple keep: solid wall block (building drawn as decor on top)
  rect(58,25,70,32,16);
  // stairs from quay up to the temple door
  rect(62,33,66,36,18);
  // three left piers, each with a boat you can board
  for(const py of [36,41,46]){
    rect(44,py,54,py,5);          // pier
    rect(40,py-1,42,py,17);       // boat deck (walk aboard!)
    setT(43,py,5);                // boarding plank
  }
  // bottom boat by the quay
  rect(59,51,61,52,17);setT(62,51,5);
  // outer pier frame: top walkway + right leg (like the reference frame)
  rect(44,28,80,28,5);
  rect(80,28,80,38,5);
  setT(44,29,5);setT(44,30,5);setT(44,31,5);setT(44,32,5);setT(44,33,5);setT(44,34,5);setT(44,35,5); // left leg joins top pier to first pier
  // red flagship, boarded from the top pier
  rect(74,24,79,26,17);setT(77,27,5);
  // carve the bay: open water under the piers so the boats float
  for(let y=29;y<=49;y++)for(let x=36;x<=49;x++){
    const t=T(x,y);if(t!==5&&t!==17)setT(x,y,0);
  }
  for(let y=29;y<=37;y++)for(let x=50;x<=54;x++){
    const t=T(x,y);if(t!==5&&t!==17&&t!==10)setT(x,y,0);
  }
  // sea rocks around the bay
  [[38,32],[36,44],[38,50],[48,55],[72,52],[82,42],[84,30],[70,22],[52,24]].forEach(([x,y])=>{if(T(x,y)===8||T(x,y)===0)setT(x,y,0)});

  // ---- castle courtyard (SW isle) ----
  rect(50,133,62,142,10);
  rect(51,127,61,132,16);
  rect(55,133,57,135,18);

  // ---- routes: path on land, bridge over water ----
  function route(x1,y1,x2,y2){
    let x=x1,y=y1;
    function lay(){
      const t=T(x,y);
      if(t===8||t===0)setT(x,y,13);
      else if(t!==5&&t!==10&&t!==16&&t!==17&&t!==18)setT(x,y,4);
    }
    while(x!==x2){lay();x+=Math.sign(x2-x)}
    while(y!==y2){lay();y+=Math.sign(y2-y)}
    lay();
  }
  route(120,90,120,44);   // hub -> mountain
  route(118,90,56,90);    // hub -> maple isle
  route(56,88,56,49);     // maple -> harbor quay
  route(122,92,178,92);   // hub -> beast isle
  route(128,40,168,40);   // mountain -> pagoda woods
  route(168,92,168,136);  // east road -> mushroom beach
  route(46,98,46,136);route(46,136,49,136);route(49,136,49,138); // maple -> castle isle (west of the keep)
  route(46,98,52,98);     // link castle road to maple isle paths
  route(194,44,208,44);route(208,44,208,52); // pagoda -> islet

  // ---- clearings ----
  for(let y=88;y<=92;y++)for(let x=118;x<=122;x++)if(SOLID(T(x,y))&&T(x,y)!==8)setT(x,y,2);
  [[168,142],[180,40],[66,44],[120,36],[168,141],[180,41],[66,45],[120,37],[121,36],[119,36],
   [56,137],[56,138],[112,33],[112,34],[212,54],[212,55],[138,90],[138,91],[60,41],[60,42],
   [166,139],[166,140],[56,96],[56,97],[55,96],[57,96],
   [154,146],[154,147],[110,96],[110,97],[128,38],[128,39]].forEach(([x,y])=>{
    const t=T(x,y);if(t===3||t===6||t===11||t===12||t===14)setT(x,y,t===14?19:2);
  });

  // ---- TEAM PLAZA at the crossroads ----
  rect(114,85,126,95,10);                                   // stone plaza
  for(let y=89;y<=91;y++)for(let x=118;x<=122;x++)setT(x,y,2); // mossy center patch
  [[116,87],[124,87],[116,93],[124,93]].forEach(([x,y])=>setT(x,y,20)); // statue pedestals
})();

const keys={};
let pressBuf={};
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(!keys[e.key])pressBuf[e.key]=true;
  keys[e.key]=true;
});
addEventListener('keyup',e=>keys[e.key]=false);
const down=k=>!!keys[k];
const pressed=k=>!!pressBuf[k];
const dirDown={
  up:()=>down('ArrowUp')||down('w')||down('W'),
  dn:()=>down('ArrowDown')||down('s')||down('S'),
  lf:()=>down('ArrowLeft')||down('a')||down('A'),
  rt:()=>down('ArrowRight')||down('d')||down('D')
};
const action=()=>pressed(' ')||pressed('Enter');

// ---------- touch controls (phones & tablets — desktop unchanged) ----------
const isTouch=('ontouchstart' in window)||((navigator.maxTouchPoints||0)>0);
const TZ={dpad:{cx:64,cy:296,r:50},a:{cx:434,cy:302,r:28},m:{cx:450,cy:96,r:16}};
function handleTouches(e){
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const scx=480/rect.width,scy=360/rect.height;
  const want={up:false,dn:false,lf:false,rt:false,a:false,m:false};
  for(const t of e.touches){
    const x=(t.clientX-rect.left)*scx,y=(t.clientY-rect.top)*scy;
    const dxp=x-TZ.dpad.cx,dyp=y-TZ.dpad.cy;
    if(Math.hypot(dxp,dyp)<TZ.dpad.r+22){
      if(Math.abs(dxp)>Math.abs(dyp)*0.5){if(dxp<-8)want.lf=true;else if(dxp>8)want.rt=true}
      if(Math.abs(dyp)>Math.abs(dxp)*0.5){if(dyp<-8)want.up=true;else if(dyp>8)want.dn=true}
    }
    else if(Math.hypot(x-TZ.a.cx,y-TZ.a.cy)<TZ.a.r+16)want.a=true;
    else if(Math.hypot(x-TZ.m.cx,y-TZ.m.cy)<TZ.m.r+12)want.m=true;
    else if(state==='title')want.a=true; // tap anywhere to start
  }
  const mapKD=(cond,key)=>{
    if(cond&&!keys[key]){pressBuf[key]=true;keys[key]=true}
    if(!cond&&keys[key])keys[key]=false;
  };
  mapKD(want.up,'ArrowUp');mapKD(want.dn,'ArrowDown');
  mapKD(want.lf,'ArrowLeft');mapKD(want.rt,'ArrowRight');
  mapKD(want.a,' ');mapKD(want.m,'m');
}
if(isTouch){
  for(const ev of ['touchstart','touchmove','touchend','touchcancel'])
    cv.addEventListener(ev,handleTouches,{passive:false});
}
function drawTouchUI(){
  if(!isTouch)return;
  const c=TZ.dpad;
  ctx.globalAlpha=0.30;
  ctx.fillStyle='#101322';ctx.beginPath();ctx.arc(c.cx,c.cy,c.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f4f4f4';
  ctx.beginPath();ctx.moveTo(c.cx,c.cy-36);ctx.lineTo(c.cx-11,c.cy-20);ctx.lineTo(c.cx+11,c.cy-20);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(c.cx,c.cy+36);ctx.lineTo(c.cx-11,c.cy+20);ctx.lineTo(c.cx+11,c.cy+20);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(c.cx-36,c.cy);ctx.lineTo(c.cx-20,c.cy-11);ctx.lineTo(c.cx-20,c.cy+11);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(c.cx+36,c.cy);ctx.lineTo(c.cx+20,c.cy-11);ctx.lineTo(c.cx+20,c.cy+11);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c14136';ctx.beginPath();ctx.arc(TZ.a.cx,TZ.a.cy,TZ.a.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#22243a';ctx.beginPath();ctx.arc(TZ.m.cx,TZ.m.cy,TZ.m.r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.75;
  ctx.fillStyle='#f4f4f4';ctx.font='14px monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('A',TZ.a.cx,TZ.a.cy-7);
  ctx.font='10px monospace';ctx.fillText('M',TZ.m.cx,TZ.m.cy-5);
  ctx.globalAlpha=1;
}

// ---------- audio: every sound synthesized live (no files) ----------
let AC=null,masterG=null,muted=false,wavesG=null,rainG=null,_nb=null;
function audioInit(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterG=AC.createGain();masterG.gain.value=0.5;masterG.connect(AC.destination);
    const mk=(f1,f2,vol)=>{
      const s=AC.createBufferSource();s.buffer=noiseBuf();s.loop=true;
      const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=(f1+f2)/2;bp.Q.value=0.4;
      const g=AC.createGain();g.gain.value=vol;
      s.connect(bp);bp.connect(g);g.connect(masterG);s.start();return g;
    };
    wavesG=mk(150,600,0.022);   // distant surf, always whispering
    rainG=mk(1000,4200,0);      // rain hiss, volume follows the weather
  }catch(e){}
}
addEventListener('keydown',audioInit);
addEventListener('pointerdown',audioInit);
function noiseBuf(){
  if(_nb)return _nb;
  _nb=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const d=_nb.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  return _nb;
}
function tone(f,dur,type,vol,slide,when){
  if(!AC||muted)return;
  try{
    const t0=AC.currentTime+(when||0);
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(f,t0);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+dur);
    g.gain.setValueAtTime(vol||0.12,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g);g.connect(masterG);
    o.start(t0);o.stop(t0+dur);
  }catch(e){}
}
function whoosh(dur,vol,f1,f2,when){
  if(!AC||muted)return;
  try{
    const t0=AC.currentTime+(when||0);
    const n=AC.createBufferSource();n.buffer=noiseBuf();
    const bp=AC.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=((f1||300)+(f2||3000))/2;bp.Q.value=0.5;
    const g=AC.createGain();
    g.gain.setValueAtTime(vol||0.18,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    n.connect(bp);bp.connect(g);g.connect(masterG);
    n.start(t0);n.stop(t0+dur);
  }catch(e){}
}

const isLand=t=>t!==undefined&&t!==0&&t!==8;
function foam(sx,sy,x,y){
  // animated surf where water meets land
  const ph=((frame/22)|0)%2;
  const fw=2+ph;
  const c='rgba(255,255,255,'+(ph?0.55:0.4)+')';
  if(isLand(T(x-1,y)))px(sx,sy+1,fw,TS-2,c);
  if(isLand(T(x+1,y)))px(sx+TS-fw,sy+1,fw,TS-2,c);
  if(isLand(T(x,y-1)))px(sx+1,sy,TS-2,fw,c);
  if(isLand(T(x,y+1)))px(sx+1,sy+TS-fw,TS-2,fw,c);
}

// the cat hero: calico cat, red scarf, blue overalls — walk cycle w/ tail wag & bob
function drawCat(sx,sy,dir,walkFrame){
  const step=walkFrame%2===1;
  const bob=step?1:0;
  sy+=bob;
  // tail (wags with steps)
  const wag=step?1:-1;
  if(dir==='left'){px(sx+13,sy+9+wag,3,2,P.catO);px(sx+15,sy+8+wag,1,2,P.catB)}
  else if(dir==='right'){px(sx,sy+9+wag,3,2,P.catO);px(sx,sy+8+wag,1,2,P.catB)}
  else{px(sx+13,sy+9,2,3+wag,P.catO);px(sx+13,sy+11+wag,2,2,P.catB)}
  // legs / paws
  if(step){px(sx+4,sy+13,3,3-bob,P.catW);px(sx+9,sy+14,3,2-bob,P.catW)}
  else{px(sx+4,sy+13,3,3,P.catW);px(sx+9,sy+13,3,3,P.catW)}
  // body: blue overalls
  px(sx+4,sy+9,8,4,P.overall);
  px(sx+5,sy+8,2,2,P.overall);px(sx+9,sy+8,2,2,P.overall); // straps
  // arms
  px(sx+2,sy+9,2,3,P.catW);px(sx+12,sy+9,2,3,P.catW);
  // scarf (flutters while walking)
  px(sx+4,sy+7,8,2,P.scarf);
  if(dir==='left')px(sx+12,sy+7+(step?1:0),3,2,P.scarf);
  else px(sx+1,sy+7+(step?1:0),3,2,P.scarf);
  // head
  px(sx+3,sy,10,7,P.catW);
  // ears
  px(sx+3,sy-2,3,3,P.catO);px(sx+10,sy-2,3,3,P.catB);
  px(sx+4,sy-1,1,1,P.pink);px(sx+11,sy-1,1,1,P.pink);
  // fur patches
  if(dir==='up'){
    px(sx+3,sy,4,4,P.catO);px(sx+9,sy,4,3,P.catB);px(sx+6,sy+1,4,3,P.catB);
  }else{
    px(sx+3,sy,4,2,P.catO);px(sx+10,sy,3,2,P.catB);
    // face
    if(dir==='down'){
      px(sx+5,sy+3,2,2,P.black);px(sx+9,sy+3,2,2,P.black);
      px(sx+7,sy+5,2,1,P.pink);
    }else if(dir==='left'){
      px(sx+4,sy+3,2,2,P.black);px(sx+3,sy+5,2,1,P.pink);
    }else if(dir==='right'){
      px(sx+10,sy+3,2,2,P.black);px(sx+11,sy+5,2,1,P.pink);
    }
  }
}

const SPR_RIGHT=SPR_LEFT.map(r=>r.split('').reverse().join(''));
const HSPR={down:SPR_DOWN,up:SPR_UP,left:SPR_LEFT,right:SPR_RIGHT};
function drawHero(sx,sy,dir,walkFrame,roll){
  roll=roll||0;
  if(roll>0){ // tumbling! hair spins around the curled body
    const ph=((16-roll)>>2)%4;
    const hop=roll>8?-2:0;
    sy+=hop;
    px(sx+3,sy+5,10,9,HPAL.j);
    px(sx+4,sy+4,8,1,HPAL.j);px(sx+4,sy+14,8,1,HPAL.J);
    px(sx+5,sy+7,6,4,HPAL.s);
    if(ph===0)px(sx+4,sy+2,8,3,HPAL.h);
    else if(ph===1)px(sx+12,sy+6,3,7,HPAL.h);
    else if(ph===2)px(sx+4,sy+14,8,3,HPAL.H);
    else px(sx+1,sy+6,3,7,HPAL.h);
    px(sx+6,sy+9,2,2,HPAL.p);px(sx+9,sy+9,2,2,HPAL.p);
    return;
  }
  const rows=HSPR[dir]||SPR_DOWN;
  const walking=walkFrame>0;
  // 4-pose stride cycle: contact - passing - contact - passing
  const pose=walking?((walkFrame|0)%4):-1;
  const bob=(pose===1||pose===3)?-1:0; // body rises on the passing step
  const yOff=16-rows.length;
  const legStart=rows.length-3; // replace bottom 3 data rows with stride legs while walking
  for(let r=0;r<rows.length;r++){
    if(walking&&r>=legStart)break;
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const ch=row[c];
      if(ch==='.')continue;
      px(sx+c,sy+r+yOff+(walking?bob:0),1,1,HPAL[ch]);
    }
  }
  // team scarf
  const tc=teamCol();
  if(tc)px(sx+3,sy+7+(walking?bob:0),10,2,tc);
  if(!walking)return;
  // procedural stride legs (ground line sy+15)
  const gy=sy+13;
  const stride=(pose===0)?1:(pose===2)?-1:0; // +1 near-leg fwd, -1 near-leg back, 0 passing
  if(dir==='left'||dir==='right'){
    const fwd=dir==='left'?-1:1;
    const near=sx+4,far=sx+9; // fixed hips: legs keep their place & color
    px(near+fwd*stride*2,gy,3,2,HPAL.p);px(near+fwd*stride*2,gy+2,3,1,HPAL.b);
    px(far-fwd*stride*2,gy,3,2,HPAL.P);px(far-fwd*stride*2,gy+2,3,1,HPAL.b);
  }else{
    const l1=sx+3,l2=sx+9;
    if(stride===1){ // left foot mid-step (lifted), right planted
      px(l1,gy,3,1,HPAL.p);px(l1,gy+1,3,1,HPAL.b);
      px(l2,gy,3,2,HPAL.p);px(l2,gy+2,3,1,HPAL.b);
    }else if(stride===-1){
      px(l2,gy,3,1,HPAL.p);px(l2,gy+1,3,1,HPAL.b);
      px(l1,gy,3,2,HPAL.p);px(l1,gy+2,3,1,HPAL.b);
    }else{
      px(l1,gy,3,2,HPAL.p);px(l1,gy+2,3,1,HPAL.b);
      px(l2,gy,3,2,HPAL.p);px(l2,gy+2,3,1,HPAL.b);
    }
  }
}
// particles: sparkle trail + hit debris
let parts=[];
function spawnSparkle(){
  if(parts.length>60)return;
  parts.push({x:player.x+(Math.random()*10-5),y:player.y+7+(Math.random()*3),
    vx:0,vy:-0.15,life:18,c:['#ff9ff3','#f368e0','#feca57'][(Math.random()*3)|0]});
}
function spawnBurst(wx,wy,cols){
  for(let i=0;i<8;i++){
    if(parts.length>60)break;
    parts.push({x:wx+Math.random()*10-5,y:wy+Math.random()*10-5,
      vx:Math.random()*2-1,vy:-Math.random()*1.5,life:22,g:true,c:cols[(Math.random()*cols.length)|0]});
  }
}
function drawSparkles(cx,cy){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.life--;p.x+=p.vx||0;p.y+=p.vy||0;if(p.g)p.vy+=0.06;
    if(p.life<=0){parts.splice(i,1);continue}
    ctx.globalAlpha=Math.min(1,p.life/18);
    px(p.x-cx,p.y-cy,2,2,p.c);
    ctx.globalAlpha=1;
  }
}

    const tile=T((x/TS)|0,(y/TS)|0);
    const n=nightAmount();
    if(n>0.5&&(tile===2||tile===7))ambPush({t:'fly',x,y,ph:Math.random()*99,life:420,max:420});
    else if(n<0.3&&tile===7)ambPush({t:'bfly',x,y,ph:Math.random()*99,vx:0.25,life:520,max:520});
    else if(tile===9)ambPush({t:'snow',x,y:y-30,ph:Math.random()*99,life:320,max:320});
    else if(tile===19||tile===14)ambPush({t:'ember',x,y,ph:Math.random()*99,life:210,max:210});
  }
  // temple chimney smoke
  if(frame%26===0){
    const smx=63.5*TS,smy=21*TS;
    if(smx>cx-40&&smx<cx+W+40&&smy>cy-60&&smy<cy+H+60)
      ambPush({t:'smoke',x:smx+(Math.random()*4-2),y:smy,ph:Math.random()*99,life:200,max:200});
  }
  // passing birds & wind gusts
  if(frame%640===0)ambPush({t:'bird',x:cx-24,y:cy+30+Math.random()*(H/2),vx:1.5+Math.random()*0.6,ph:Math.random()*99,life:460,max:460});
  if(frame%370===0)for(let i=0;i<3;i++)ambPush({t:'wind',x:cx-30-i*40,y:cy+40+Math.random()*(H-80),vx:3.4,ph:i,life:220,max:220});
  // update + draw
  for(let i=amb.length-1;i>=0;i--){
    const p=amb[i];p.life--;
    if(p.life<=0){amb.splice(i,1);continue}
    const a=Math.min(1,p.life/(p.max*0.4));
    const sx=p.x-cx,sy=p.y-cy;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60){if(p.t!=='bird'&&p.t!=='wind'){amb.splice(i,1)}else{p.x+=p.vx||0};continue}
    switch(p.t){
      case 'foot':
        ctx.globalAlpha=0.30*a;
        px(sx-3,sy,3,2,p.snow?'#b9c9d9':'#b8a06c');px(sx+2,sy+1,3,2,p.snow?'#b9c9d9':'#b8a06c');
        break;
      case 'fly':{
        p.x+=Math.sin(frame/22+p.ph)*0.5;p.y+=Math.cos(frame/26+p.ph)*0.4;
        const gl=(Math.sin(frame/9+p.ph)+1)/2;
        ctx.globalAlpha=a*gl;
        px(sx-1,sy-1,3,3,'rgba(217,247,106,0.5)');px(sx,sy,2,2,'#e8ff9a');
        break;}
      case 'bfly':{
        p.x+=p.vx+Math.sin(frame/14+p.ph)*0.5;p.y+=Math.sin(frame/9+p.ph)*0.8;
        ctx.globalAlpha=a;
        const fl=((frame/6)|0)%2;
        const bc=(p.ph%2<1)?'#fff6d5':'#ffd7ef';
        if(fl){px(sx-2,sy,2,2,bc);px(sx+1,sy,2,2,bc)}
        else{px(sx-1,sy-1,1,3,bc);px(sx+1,sy-1,1,3,bc)}
        break;}
      case 'snow':
        p.y+=0.7;p.x+=Math.sin(frame/18+p.ph)*0.4;
        ctx.globalAlpha=0.85*a;
        px(sx,sy,2,2,'#ffffff');
        break;
      case 'ember':
        p.y-=0.45;p.x+=Math.sin(frame/12+p.ph)*0.3;
        ctx.globalAlpha=a;
        px(sx,sy,2,2,(p.life%14<7)?'#ff8c1a':'#ffd21a');
        break;
      case 'smoke':{
        p.y-=0.35;p.x+=Math.sin(frame/24+p.ph)*0.25+0.12;
        const r=3+(1-p.life/p.max)*7;
        ctx.globalAlpha=0.16*a;
        ctx.fillStyle='#cfd4dc';ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
        break;}
      case 'bird':{
        p.x+=p.vx;p.y+=Math.sin(frame/20+p.ph)*0.4;
        ctx.globalAlpha=0.8;
        const w=((frame/7)|0)%2?2:-1;
        px(sx-4,sy-w,4,1,'#2a2d3a');px(sx,sy-w,4,1,'#2a2d3a');px(sx-1,sy,2,1,'#2a2d3a');
        break;}
      case 'wind':
        p.x+=p.vx;p.y-=0.1;
        ctx.globalAlpha=0.16*a;
        px(sx,sy,26,1,'#ffffff');px(sx+6,sy+2,14,1,'#ffffff');
        break;
    }
    ctx.globalAlpha=1;
  }
}

// weather system: a new front rolls in every ~5 minutes
const WSEQ=['clear','rain','clear','fog','storm','clear','fog','rain','clear','storm'];
function weather(){
  const per=18000; // ~5 min at 60fps
  const idx=(frame/per)|0;
  const t=frame%per;
  let inten=1;
  if(t<600)inten=t/600;            // front rolls in
  else if(t>per-600)inten=(per-t)/600; // clears out
  return {type:WSEQ[idx%WSEQ.length],inten};
}

function drawLightning(r){
  const cell=((frame/240)|0);
  const rnd=((cell*2654435761)>>>0)%1000/1000;
  if(rnd<0.35){ // this stretch of storm has a strike
    const ph=frame%240;
    if(ph===0)sfx.thunder();
    if(ph<5){
      ctx.fillStyle='rgba(255,255,255,'+((5-ph)/5*0.75*r)+')';
      ctx.fillRect(0,0,W,H);
      // jagged bolt
      const bx=((cell*7919)%W);
      ctx.strokeStyle='rgba(255,250,200,'+((5-ph)/5*r)+')';
      ctx.lineWidth=2;ctx.beginPath();
      let x=bx,y=0;ctx.moveTo(x,y);
      for(let s=0;s<6;s++){x+=((cell+s)%2?18:-14);y+=H/6;ctx.lineTo(x,y)}
      ctx.stroke();
    }
  }
}
function drawWeatherFx(){
  const w=weather();
  if(w.inten<=0)return;
  if(w.type==='rain')drawRain(w.inten,false);
  else if(w.type==='storm'){drawRain(w.inten,true);drawLightning(w.inten)}
  else if(w.type==='fog')drawFog(w.inten);
}

// day/night cycle: ~2.5 min per full day
function dayPhase(){return (frame%9000)/9000}
function nightAmount(){
  const t=dayPhase();
  if(t<0.42)return 0;                       // day
  if(t<0.52)return (t-0.42)/0.10;           // dusk
  if(t<0.88)return 1;                       // night
  return 1-(t-0.88)/0.12;                   // dawn
}
function drawDayNight(cx,cy){
  const t=dayPhase(),n=nightAmount();
  // dusk/dawn warm wash
  if(n>0&&n<1){
    ctx.fillStyle='rgba(255,120,50,'+(0.14*(1-Math.abs(n-0.5)*2)+0.06)+')';
    ctx.fillRect(0,0,W,H);
  }
  // night blue
  if(n>0){
    ctx.fillStyle='rgba(12,20,55,'+(0.38*n)+')';
    ctx.fillRect(0,0,W,H);
    // lantern light pools
    for(const d of decor){
      if(d.f!==drawLantern)continue;
      const sx=d.x+3-cx,sy=d.y-4-cy;
      if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
      const g=ctx.createRadialGradient(sx,sy,2,sx,sy,34);
      g.addColorStop(0,'rgba(255,214,110,'+(0.34*n)+')');
      g.addColorStop(1,'rgba(255,214,110,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(sx,sy,34,0,Math.PI*2);ctx.fill();
    }
    // stars at deep night
    if(n>0.85){
      for(let i=0;i<24;i++){
        const stx=(i*97+13)%W,sty=(i*61+7)%(H/2);
        if((i+((frame/50)|0))%6)px(stx,sty,1,1,'rgba(255,255,255,0.7)');
      }
    }
  }
}
function drawVignette(){
  const g=ctx.createRadialGradient(W/2,H/2,H*0.48,W/2,H/2,H*0.95);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(10,15,35,0.32)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const s=ctx.createRadialGradient(W*0.35,H*0.3,40,W*0.35,H*0.3,H*0.9);

  s.addColorStop(1,'rgba(255,240,200,0)');
  ctx.fillStyle=s;ctx.fillRect(0,0,W,H);
}

function saveGame(){
  try{
    localStorage.setItem('advisland',JSON.stringify({
      badges,team,crowned,tamed,coinCount,
      coins:coins.map(c=>c.got),px:player.x,py:player.y}));
  }catch(e){}
}
let hasSave=false;
(function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem('advisland'));
    if(!d)return;
    hasSave=true;
    Object.keys(badges).forEach(k=>{if(d.badges&&d.badges[k])badges[k]=true});
    team=d.team||null;crowned=!!d.crowned;tamed=!!d.tamed;coinCount=d.coinCount|0;
    if(d.coins)d.coins.forEach((g,i)=>{if(coins[i])coins[i].got=g});
    if(d.px&&d.py&&!SOLID(T((d.px/TS)|0,(d.py/TS)|0))){player.x=d.px;player.y=d.py}
  }catch(e){}
})();

// ---------- world ----------
function tryMove(dx,dy){
  const nx=player.x+dx,ny=player.y+dy;
  const cxs=[nx-5,nx+5],cys=[ny-2,ny+7];
  for(const xx of cxs)for(const yy of cys){
    const t=T((xx/TS)|0,(yy/TS)|0);
    if(SOLID(t))return;
  }
  for(const n of npcs){
    const npx=n.x*TS+8,npy=n.y*TS+8;
    if(Math.abs(nx-npx)<12&&Math.abs(ny-npy)<12)return;
  }
  player.x=nx;player.y=ny;
}
function updateWorld(){
  // rolling: fast tumble in the locked direction
  if(player.roll>0){
    player.roll--;
    const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[player.rollDir];
    const sp=3.6;
    tryMove(d[0]*sp,0);tryMove(0,d[1]*sp);
    player.walk+=0.3;
    if(frame%2===0)spawnBurst(player.x,player.y+7,['#d4bc82','#c8a86a','#feca57']);
    if(pressed('m')||pressed('M')){state='map'}
    return;
  }
  let mx=0,my=0;
  if(dirDown.up()){my=-1;player.dir='up'}
  else if(dirDown.dn()){my=1;player.dir='down'}
  if(dirDown.lf()){mx=-1;player.dir='left'}
  else if(dirDown.rt()){mx=1;player.dir='right'}
  if(mx||my){
    const sp=player.speed*(mx&&my?0.72:1);
    tryMove(mx*sp,0);tryMove(0,my*sp);
    player.walk+=0.16;
    if(frame%5===0)spawnSparkle();
    if(frame%12===0)spawnFootprint();
    if(frame%14===0)sfx.step(T((player.x/TS)|0,((player.y+7)/TS)|0));
  }else player.walk=0;
  // coin pickup
  for(const c of coins){
    if(c.got)continue;
    if(Math.abs(player.x-c.x)<11&&Math.abs(player.y-c.y)<11){
      c.got=true;coinCount++;
      spawnBurst(c.x,c.y,[P.gold,'#f7dc6f','#fffbe0']);
      sfx.coin();
      saveGame();
    }
  }
  if(frame%300===0)saveGame();
  if(pressed('m')||pressed('M')){state='map';return}
  if(action()){
    for(const n of npcs){
      const npx=n.x*TS+8,npy=n.y*TS+8;
      if(Math.abs(player.x-npx)<26&&Math.abs(player.y-npy)<26){talkTo(n);return}
    }
    // the beast of Beast Isle
    if(Math.abs(player.x-(190*TS))<52&&Math.abs(player.y-(96*TS))<44){
      if(tamed)say(["The beast purrs like a","giant thunderstorm.","It seems... happy."]);
      else say(["The beast rears up, eyes","blazing! It challenges you!","Dodge its flame lanes with","LEFT / RIGHT, then BONK it","with SPACE when it's dizzy!"],()=>{startBeast()});
      return;
    }
    // team statues
    for(const t of teams){
      const tx=t.x*TS+8,ty=t.y*TS+8;
      if(Math.abs(player.x-tx)<24&&Math.abs(player.y-ty)<24){
        if(team===t.id)say(["You're already on "+t.name+"!","Go win some badges for us!"]);
        else{team=t.id;saveGame();say(["The statue glows warmly...","Welcome to "+t.name+"!","Wear your colors with pride."])}
        return;
      }
    }
    player.roll=16;player.rollDir=player.dir;sfx.roll(); // no one to talk to: ROLL!
  }
}
function recruitTalk(n){
  const t=teams.find(t=>t.id===n.recruit);
  const port={shirt:t.color};
  if(team===t.id){say(["Proud to have you with us!","GO "+t.name+"!"],null,port);return}
  dialog={lines:["Salutations. A new student","for "+t.name+"?"],idx:0,portrait:port,
    opts:[
      {label:"Join "+t.short+"!",fn:()=>{team=t.id;saveGame();
        say(["Welcome aboard, champion!","Wear the "+t.short+" colors","with pride!"],null,port)}},
      {label:"Nah.",fn:()=>{say(["Suit yourself, champ."],null,port)}},
      {label:"Who?",fn:()=>{say(["We are "+t.name+"!","Six badges, one beast, and","endless glory await us.","Think it over!"],null,port)}}
    ]};
  state='dialog';
}
function talkTo(n){
  if(n.recruit){recruitTalk(n);return}
  if(n.villager){say(n.lines);return}
  if(n.id==='delta'){
    if(crowned)say(n.done);
    else if(badgeCount()===9)say(n.crown,()=>{crowned=true;saveGame();state='victory'});
    else{const l=n.locked.slice();l[l.length-1]+=badgeCount()+' / 9';say(l)}
    return;
  }
  if(badges[n.id]){say(n.done);return}
  say(n.intro,()=>startGame(n));
}
function camera(){
  let cx=player.x-W/2,cy=player.y-H/2;
  cx=Math.max(0,Math.min(MW*TS-W,cx));cy=Math.max(0,Math.min(MH*TS-H,cy));
  return[cx|0,cy|0];
}
function drawWorld(){
  const[cx,cy]=camera();
  const x0=(cx/TS)|0,y0=(cy/TS)|0;
  for(let y=y0;y<=y0+H/TS;y++)for(let x=x0;x<=x0+W/TS;x++){
    if(x<0||x>=MW||y<0||y>=MH)continue;
    drawTile(T(x,y),x*TS-cx,y*TS-cy,x,y);
  }
  drawAmbient(cx,cy);
  drawClouds(cx,cy);
  // decorations
  for(const d of decor){
    const sx=d.x-cx,sy=d.y-cy;
    if(sx<-240||sx>W+120||sy<-160||sy>H+120)continue;
    d.f(sx,sy,d.c);
  }
  // coins
  for(const c of coins){
    if(c.got)continue;
    const sx=c.x-cx,sy=c.y-cy;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20)continue;
    drawCoin(sx,sy);
  }
  // NPCs
  for(const n of npcs){
    const sx=n.x*TS-cx,sy=n.y*TS-cy;
    shadow(sx+8,sy+16,7,3);
    drawPerson(sx,sy,'down',0,n.color,n.id==='delta'?P.gold:P.black);
    if(n.id==='delta'){px(sx+5,sy-3,6,3,P.gold);px(sx+5,sy-5,1,2,P.gold);px(sx+8,sy-5,1,2,P.gold);px(sx+10,sy-5,1,2,P.gold)}
    if(n.villager||n.recruit)continue;
    const has=n.id==='delta'?crowned:badges[n.id];
    if(!has&&Math.abs(player.x-(n.x*TS+8))<40&&Math.abs(player.y-(n.y*TS+8))<40){
      text('!',sx+8,sy-14,P.gold,12,'center');
    }
  }
  drawSparkles(cx,cy);
  shadow(player.x-cx,player.y+8-cy,7,3);
  drawHero(player.x-8-cx,player.y-8-cy,player.dir,player.walk,player.roll);
  drawPetals(cx,cy);
  drawWeatherFx();
  drawDayNight(cx,cy);
  drawVignette();
  drawHud();
}

  const m=mg;
  if(m.over){if(action())endGame(m.won);return}
  m.t++;
  if(m.t===30||m.t===60)sfx.beep();
  if(m.t===90)sfx.go();
  if(m.t>90){

    if(pressed('ArrowLeft')||pressed('a')||pressed('A')){if(m.last!=='L'){m.you+=3.1;m.last='L';sfx.step(1)}}
    if(pressed('ArrowRight')||pressed('d')||pressed('D')){if(m.last!=='R'){m.you+=3.1;m.last='R';sfx.step(1)}}
    if(m.you>=100||m.rival>=100){m.over=true;m.won=m.you>=100&&m.you>=m.rival}
  }
}

  m.tx+=m.tv;
  if(m.tx<50||m.tx>W-50)m.tv*=-1;

  }

// --- castle table tennis ---
function updatePong(){
  const m=mg;
  if(m.over){if(action())endGame(m.won);return}
  m.t++;
  if(dirDown.up())m.py-=4.5;
  if(dirDown.dn())m.py+=4.5;
  m.py=Math.max(92,Math.min(278,m.py));
  // AI paddle chases with a speed cap
  const aiSp=2.6;
  if(m.ay<m.by-4)m.ay+=aiSp;else if(m.ay>m.by+4)m.ay-=aiSp;
  m.ay=Math.max(92,Math.min(278,m.ay));
  // ball
  m.bx+=m.vx;m.by+=m.vy;
  if(m.by<74){m.by=74;m.vy=Math.abs(m.vy);sfx.wall()}
  if(m.by>296){m.by=296;m.vy=-Math.abs(m.vy);sfx.wall()}
  // paddles at x=64 (you) and x=416 (Pip), h=44
  if(m.vx<0&&m.bx<70&&m.bx>58&&Math.abs(m.by-m.py)<26){
    m.vx=Math.abs(m.vx)*1.05;m.vy+=(m.by-m.py)*0.12;sfx.paddle();
  }
  if(m.vx>0&&m.bx>410&&m.bx<422&&Math.abs(m.by-m.ay)<26){
    m.vx=-Math.abs(m.vx)*1.05;m.vy+=(m.by-m.ay)*0.12;sfx.paddle();
  }
  m.vy=Math.max(-5,Math.min(5,m.vy));
  if(m.bx<40){m.as++;m.bx=W/2;m.by=185;m.vx=3.4;m.vy=(Math.random()*4-2);sfx.score()}
  if(m.bx>440){m.ps++;m.bx=W/2;m.by=185;m.vx=-3.4;m.vy=(Math.random()*4-2);sfx.hit()}
  if(m.ps>=5||m.as>=5){m.over=true;m.won=m.ps>=5}
}

    text(mg.won?'PERFECT RUN!':'SNOW SOUP...',W/2,H/2-24,mg.won?P.gold:P.red,14,'center');

  }
}

// --- the beast of Beast Isle ---
function updateBeast(){
  const m=mg;
  if(m.over){
    if(action()){
      const won=m.won;mg=null;
      if(won){tamed=true;saveGame();say(["The beast blinks... then","flops over for belly rubs!","You TAMED THE BEAST!","The dark isle feels","warmer already."])}
      else say(["You dive into the water","just in time!","The beast huffs. Try again","when you're ready."]);
    }
    return;
  }
  m.t++;if(m.hurt>0)m.hurt--;
  if(pressed('ArrowLeft')||pressed('a')||pressed('A'))m.pos=Math.max(0,m.pos-1);
  if(pressed('ArrowRight')||pressed('d')||pressed('D'))m.pos=Math.min(2,m.pos+1);
  if(m.phase==='attack'){
    const cyc=m.t%90;
    if(cyc===1){ // telegraph two lanes
      const safe=(Math.random()*3)|0;
      m.tele=[0,1,2].filter(l=>l!==safe);
    }
    if(cyc===50){
      m.flame=25;sfx.flame();
      if(m.tele.includes(m.pos)&&m.hurt===0){
        m.hits++;m.hurt=50;sfx.lose();
        if(m.hits>=3){m.over=true;m.won=false}
      }
    }
    if(m.flame>0)m.flame--;
    if(m.t>0&&m.t%270===0){m.phase='stun';m.stunT=110;m.tele=[]}
  }else{ // stunned
    m.stunT--;
    if(pressed(' ')){
      m.hp--;spawnBurst(player.x,player.y,['#ffd21a','#ff8c1a',P.white]);
      sfx.bonk();
      m.phase='attack';m.t=0;
      if(m.hp<=0){m.over=true;m.won=true;sfx.win()}
    }
    if(m.stunT<=0){m.phase='attack';m.t=0}
  }
}

  drawBeast(W/2-48,26);
  const lx=[140,240,340];

    px(lx[l]-34,286,68,12,'#3a3a44');px(lx[l]-34,286,68,3,'#55556a');
    if(mg.tele.includes(l)&&mg.phase==='attack'&&(frame%10<5))px(lx[l]-30,282,60,4,'rgba(255,140,26,0.6)');
    if(mg.flame>0&&mg.tele.includes(l)){
      const fh=120+Math.sin(frame)*8;
      px(lx[l]-16,286-fh,32,fh,'rgba(255,110,20,0.85)');
      px(lx[l]-8,286-fh+10,16,fh-20,'#ffd21a');

  }
}

let playsTotal=null,playsToday=null;

    fetch('https://api.counterapi.dev/v1/adventureisland-sgp/plays/up')
      .then(r=>r.json()).then(d=>{playsTotal=d.count}).catch(()=>{});
    fetch('https://api.counterapi.dev/v1/adventureisland-sgp/plays'+day+'/up')
      .then(r=>r.json()).then(d=>{playsToday=d.count}).catch(()=>{});
  }catch(e){}
})();
function drawPlayCount(){

  text(s,9,H-17,'rgba(0,0,0,0.6)',9);
  text(s,8,H-18,'#ffd94a',9);
}

function drawHeroBig(sx,sy,s){
  // hero head + torso at scale s (rows 0..15)
  for(let r=0;r<16;r++){
    const row=SPR_DOWN[r];
    for(let c=0;c<row.length;c++){
      const ch=row[c];
      if(ch==='.')continue;
      px(sx+c*s,sy+r*s,s,s,HPAL[ch]);
    }
  }
}
function drawPalm(sx,sy){
  px(sx+4,sy,3,14,'#8a6b45');
  px(sx-3,sy-4,8,4,'#2f9e44');px(sx+6,sy-4,8,4,'#2f9e44');
  px(sx-1,sy-7,6,4,'#3fae54');px(sx+6,sy-7,6,4,'#3fae54');
  px(sx+3,sy-9,5,4,'#2f9e44');
}
function drawTitle(){
  if(titleImgOk){
    // your artwork, cover-fit to the screen
    const iw=titleImg.width,ih=titleImg.height;
    const sc=Math.max(W/iw,H/ih);
    const dw=iw*sc,dh=ih*sc;
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(titleImg,(W-dw)/2,(H-dh)/2,dw,dh);
    ctx.imageSmoothingEnabled=false;
    if(frame%70<45){
      text('PRESS SPACE',W/2+2,H-38,'rgba(0,0,0,0.6)',13,'center');
      text('PRESS SPACE',W/2,H-40,P.white,13,'center');
    }
    if(hasSave)text('save found — continuing your adventure',W/2,H-16,'rgba(255,255,255,0.85)',8,'center');
    drawPlayCount();
    return;
  }
  // bright tropical sky
  px(0,0,W,90,'#4db4f0');px(0,90,W,70,'#5fc0f4');px(0,160,W,55,'#74ccf8');
  // puffy clouds (drift slowly)
  ctx.fillStyle='rgba(255,255,255,0.95)';
  const cloudPos=[[60,40,34],[150,26,26],[360,50,38],[430,28,24],[260,20,20]];
  for(const [ccx,ccy,cr] of cloudPos){
    const dx=((frame/8)|0)%(W+120)-60;
    const xx=(ccx+dx*0.25)%(W+80)-40;
    ctx.beginPath();ctx.ellipse(xx,ccy,cr,cr*0.5,0,0,Math.PI*2);ctx.fill();

  px(150,122,16,14,'#d64a3a');px(314,122,16,14,'#d64a3a');
  // gold plaque
  px(226,136,28,22,P.gold);px(229,139,22,16,'#b8860b');px(232,142,16,10,P.gold);
  // big hero above the gate
  drawHeroBig(W/2-24,52,3);
  // gold play button in the gate opening
  const pb=frame%70<45;
  const pr=27+(pb?1:0);
  ctx.fillStyle='#b8860b';ctx.beginPath();ctx.arc(W/2,232,pr+4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=pb?P.gold:'#d9ac0e';ctx.beginPath();ctx.arc(W/2,232,pr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(W/2-8,224,10,0,Math.PI*2);ctx.fill();

function updateTitle(){if(action())state='world'}
let victT=0;
function drawVictory(){
  px(0,0,W,H,P.ui);victT++;
  for(let i=0;i<40;i++){
    const cy2=(i*53+victT*(1+i%3))%H;
    px((i*97+i*i)%W,cy2,4,4,[P.gold,P.red,P.green,P.blue,P.flower1][i%5]);
  }
  drawHero(W/2-8,H/2-10,'down',0);
  px(W/2-6,H/2-18,12,4,P.gold);px(W/2-6,H/2-22,2,4,P.gold);px(W/2-1,H/2-22,2,4,P.gold);px(W/2+4,H/2-22,2,4,P.gold);
  panel(W/2-150,50,300,60);
  text('GRAND CHAMPION!',W/2,62,P.gold,20,'center');
  text('You conquered Adventure Island!',W/2,90,P.white,11,'center');
  text('All nine badges earned!',W/2,H-80,P.gold,12,'center');
  if(victT>120&&frame%70<45)text('SPACE to keep exploring',W/2,H-40,P.white,10,'center');
  if(victT>120&&action())state='world';
}

// ---------- main loop ----------
function loop(){
  frame++;
  // sound: mute toggle, music, ambience
  if(pressed('n')||pressed('N')){muted=!muted;if(masterG)masterG.gain.value=muted?0:0.5}
  musicTick();
  if(AC&&rainG)rainG.gain.value=muted?0:rainAmount()*0.10;
  if(AC&&!muted&&nightAmount()>0.7&&frame%160===0&&Math.random()<0.6)sfx.chirp();
  ctx.clearRect(0,0,W,H);
  switch(state){
    case 'title':updateTitle();drawTitle();break;
    case 'world':updateWorld();drawWorld();break;
    case 'map':updateMap();drawMap();break;
    case 'dialog':updateDialog();if(dialog)drawDialog();else drawWorld();break;
    case 'race':updateRace();if(mg)drawRace();else if(dialog)drawDialog();break;
    case 'archery':updateArchery();if(mg)drawArchery();else if(dialog)drawDialog();break;
    case 'fishing':updateFishing();if(mg)drawFishing();else if(dialog)drawDialog();break;
    case 'pong':updatePong();if(mg)drawPong();else if(dialog)drawDialog();break;
    case 'climb':updateClimb();if(mg)drawClimb();else if(dialog)drawDialog();break;
    case 'swim':updateSwim();if(mg)drawSwim();else if(dialog)drawDialog();break;
    case 'surf':updateSurf();if(mg)drawSurf();else if(dialog)drawDialog();break;
    case 'goal':updateGoal();if(mg)drawGoal();else if(dialog)drawDialog();break;
    case 'sled':updateSled();if(mg)drawSled();else if(dialog)drawDialog();break;
    case 'beast':updateBeast();if(mg)drawBeast2();else if(dialog)drawDialog();break;
    case 'victory':drawVictory();break;
  }
  drawTouchUI();
  pressBuf={};
  requestAnimationFrame(loop);
}
loop();
</script>
